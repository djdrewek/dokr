<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <!--
    Dokr Outlook Add-in — Function File
    Served from /addin/ on the same FastAPI/ngrok server.

    To use locally:
      1. Run the API:  uvicorn app.main:app --reload
      2. Expose it:    ngrok http 8000
      3. Open the Dokr Panel task pane → Settings → paste the ngrok URL → Save
         (This updates the server URL for this add-in without touching code.)
      4. The manifest.xml URLs only need updating when you change the host entirely
         (e.g. switching from GitHub Pages to production).

    Config is stored in localStorage (shared with taskpane.html on the same origin).
      dokr_base_url  — Dokr server base URL  (e.g. https://abc123.ngrok-free.app)
      dokr_api_key   — API key               (optional)
      dokr_priority  — default priority      ("standard" | "express")
      dokr_history   — JSON array of last 30 submission results
  -->
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <script>
    "use strict";

    // ── Config defaults (used until the user saves settings via the task pane) ─
    const DEFAULT_BASE_URL = "https://lily-dragging-buffalo.ngrok-free.dev";
    const HISTORY_KEY      = "dokr_history";
    const BASE_URL_KEY     = "dokr_base_url";
    const API_KEY_KEY      = "dokr_api_key";
    const PRIORITY_KEY     = "dokr_priority";
    const MAX_HISTORY      = 30;

    // ── Derived config (read from localStorage at button-press time) ──────────
    function getBaseUrl()  { return (localStorage.getItem(BASE_URL_KEY)  || DEFAULT_BASE_URL).replace(/\/$/, ""); }
    function getApiKey()   { return localStorage.getItem(API_KEY_KEY)   || ""; }
    function getPriority() { return localStorage.getItem(PRIORITY_KEY)  || "standard"; }
    function getSubmitPath() { return getBaseUrl() + "/v1/documents/submit"; }

    // ── Office.js bootstrap ───────────────────────────────────────────────────
    Office.onReady(() => {
      // Function files have no visible UI — nothing to initialise here.
    });

    // ── Main entry point (called by the ribbon button) ────────────────────────
    async function sendToDokr(event) {
      const item = Office.context.mailbox.item;

      // Capture the signed-in user's email so Dokr can notify them on failure.
      const submitterEmail =
        (Office.context.mailbox.userProfile &&
         Office.context.mailbox.userProfile.emailAddress) || "";

      // Filter to real file attachments only — exclude inline images / signatures.
      const files = (item.attachments || []).filter(
        a => a.attachmentType === Office.MailboxEnums.AttachmentType.File && !a.isInline
      );

      if (files.length === 0) {
        await notify(item, "error", "No file attachments found in this email.");
        event.completed();
        return;
      }

      await notify(item, "info",
        `Sending ${files.length} attachment${files.length > 1 ? "s" : ""} to Dokr…`
      );

      let ok = 0;
      const errors = [];

      for (const att of files) {
        try {
          const content = await getAttachmentContent(att.id);
          const result  = await upload(content, att.name, att.contentType || "application/octet-stream", submitterEmail);
          saveHistory({ file: att.name, status: "sent", doc_id: result.id, time: new Date().toISOString() });
          ok++;
        } catch (err) {
          const isDuplicate = err.message.includes("exact_duplicate");
          const status = isDuplicate ? "duplicate" : "failed";
          saveHistory({ file: att.name, status, doc_id: null, error: err.message, time: new Date().toISOString() });
          if (!isDuplicate) errors.push(`${att.name}: ${err.message}`);
        }
      }

      if (errors.length === 0 && ok > 0) {
        await notify(item, "success",
          `✓ ${ok} file${ok > 1 ? "s" : ""} sent to Dokr`
        );
      } else if (errors.length === 0 && ok === 0) {
        // All were duplicates
        await notify(item, "info",
          `⊘ Already processed — Dokr recognised ${files.length} duplicate${files.length > 1 ? "s" : ""}`
        );
      } else {
        await notify(item, "error",
          `${ok} sent, ${errors.length} failed — ${errors.join(" | ")}`
        );
      }

      event.completed();
    }

    // ── SharePoint push ───────────────────────────────────────────────────────

    /**
     * Ribbon button handler — uploads all email attachments directly to SharePoint
     * via the Dokr /v1/sharepoint/upload endpoint.
     *
     * The server holds SP credentials (SP_SITE_URL + SP_ACCESS_TOKEN) so no
     * sensitive config is needed in the add-in.  The add-in just needs a valid
     * Dokr API key and the Dokr server URL (same as for sendToDokr).
     */
    async function saveToSharePoint(event) {
      const item = Office.context.mailbox.item;

      const files = (item.attachments || []).filter(
        a => a.attachmentType === Office.MailboxEnums.AttachmentType.File && !a.isInline
      );

      if (files.length === 0) {
        await notify(item, "error", "No file attachments found in this email.");
        event.completed();
        return;
      }

      await notify(item, "info",
        `Saving ${files.length} attachment${files.length > 1 ? "s" : ""} to SharePoint…`
      );

      const base   = getBaseUrl();
      const apiKey = getApiKey();

      // Build the target folder: /Shared Documents/Dokr/from-outlook/YYYY-MM
      const spFolder = localStorage.getItem("dokr_sp_folder") || "";

      let ok = 0;
      const errors  = [];
      const webUrls = [];

      for (const att of files) {
        try {
          // Get the raw base64 content from Outlook
          const content = await getAttachmentContent(att.id);
          const binary  = atob(content.content);
          const bytes   = new Uint8Array(binary.length);
          for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

          const mimeType = att.contentType || "application/octet-stream";
          const blob     = new Blob([bytes], { type: mimeType });

          const form = new FormData();
          form.append("file", new File([blob], att.name, { type: mimeType }));
          if (spFolder) form.append("folder_path", spFolder);

          const headers = { "ngrok-skip-browser-warning": "true" };
          if (apiKey) headers["Authorization"] = "Bearer " + apiKey;

          const res = await fetch(base + "/v1/sharepoint/upload", {
            method:  "POST",
            body:    form,
            headers,
            signal:  AbortSignal.timeout(30000),
          });

          if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            const msg  = (body.detail && (body.detail.message || JSON.stringify(body.detail))) || res.statusText;
            errors.push(`${att.name}: ${msg}`);
            continue;
          }

          const data = await res.json();
          if (data.web_url) webUrls.push(data.web_url);
          ok++;

        } catch (err) {
          errors.push(`${att.name}: ${err.message}`);
        }
      }

      if (errors.length === 0 && ok > 0) {
        const urlNote = webUrls.length ? ` → ${webUrls[0]}` : "";
        await notify(item, "success",
          `✓ ${ok} file${ok > 1 ? "s" : ""} saved to SharePoint${urlNote}`
        );
      } else if (ok > 0 && errors.length > 0) {
        await notify(item, "error",
          `${ok} saved, ${errors.length} failed — ${errors.join(" | ")}`
        );
      } else {
        await notify(item, "error",
          `SharePoint upload failed — ${errors.join(" | ")}`
        );
      }

      event.completed();
    }

    // ── History ────────────────────────────────────────────────────────────────
    function saveHistory(entry) {
      try {
        const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
        history.unshift(entry);
        history.splice(MAX_HISTORY);   // keep last N
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
      } catch (_) { /* never block the pipeline */ }
    }

    // ── Helpers ───────────────────────────────────────────────────────────────

    /** Wrap getAttachmentContentAsync in a promise. */
    function getAttachmentContent(id) {
      return new Promise((resolve, reject) => {
        Office.context.mailbox.item.getAttachmentContentAsync(id, result => {
          if (result.status === Office.AsyncResultStatus.Succeeded) {
            resolve(result.value);   // { content: base64string, format: ... }
          } else {
            reject(new Error(result.error.message));
          }
        });
      });
    }

    /**
     * Decode base64 attachment and POST as multipart/form-data to the API.
     * Returns the parsed JSON response body (contains doc id, status, etc.)
     */
    async function upload(content, filename, mimeType, submitterEmail) {
      const binary = atob(content.content);
      const bytes  = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

      const blob = new Blob([bytes], { type: mimeType });
      const form = new FormData();
      form.append("file",      new File([blob], filename, { type: mimeType }));
      form.append("priority",  getPriority());
      if (submitterEmail) form.append("submitter_email", submitterEmail);

      const headers = {
        // Bypasses the ngrok browser-warning interstitial — ignored by other servers.
        "ngrok-skip-browser-warning": "true",
      };
      const apiKey = getApiKey();
      if (apiKey) headers["Authorization"] = "Bearer " + apiKey;

      const res = await fetch(getSubmitPath(), {
        method: "POST",
        body:   form,
        headers,
      });

      if (res.status === 409) {
        // Exact duplicate — not a hard failure, but we surface it differently
        const body = await res.json().catch(() => ({}));
        const err  = new Error(`exact_duplicate: ${body.detail?.original_document_id || ""}`);
        throw err;
      }

      if (!res.ok) {
        const text = await res.text().catch(() => res.statusText);
        throw new Error(`HTTP ${res.status}: ${text.slice(0, 120)}`);
      }

      return res.json();   // { id, status, ... }
    }

    /**
     * Show a notification bar at the top of the reading pane.
     * type: "info" | "success" | "error"
     */
    function notify(item, type, message) {
      return new Promise(resolve => {
        const payload =
          type === "error"
            ? {
                type: Office.MailboxEnums.ItemNotificationMessageType.ErrorMessage,
                message,
              }
            : {
                type: Office.MailboxEnums.ItemNotificationMessageType.InformationalMessage,
                message,
                icon: "Icon.16x16",
                persistent: type === "info",   // uploading bar stays; success fades
              };

        item.notificationMessages.replaceAsync("dokr-status", payload, () => resolve());
      });
    }
  </script>
</head>
<body></body>
</html>
