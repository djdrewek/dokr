<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <!--
    Dokr Outlook Add-in — Function File
    Served from the same FastAPI server as the API, so all fetch() calls
    use relative URLs and there are no CORS issues.

    To use locally:
      1. Run the API:  uvicorn app.main:app --reload
      2. Expose it:    ngrok http 8000
      3. Edit manifest.xml — replace YOUR_NGROK_URL with the ngrok https URL
      4. Sideload manifest.xml in Outlook (see README.md)
  -->
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <script>
    "use strict";

    // ── Config ────────────────────────────────────────────────────────────────
    // Full ngrok URL — update this whenever your ngrok tunnel URL changes.
    const SUBMIT_PATH = "https://lily-dragging-buffalo.ngrok-free.dev/v1/documents/submit";

    // Optional: add a static API key header if you add auth later.
    // const API_KEY = "your-key-here";

    // ── Office.js bootstrap ───────────────────────────────────────────────────
    Office.onReady(() => {
      // Nothing to initialise for a pure function-file add-in.
    });

    // ── Main entry point (called by the ribbon button) ────────────────────────
    async function sendToDokr(event) {
      const item = Office.context.mailbox.item;

      // Filter to real file attachments only — exclude inline images (logos,
      // email signatures, embedded graphics) which also come through as File type
      // but have isInline === true.
      const files = (item.attachments || []).filter(
        a => a.attachmentType === Office.MailboxEnums.AttachmentType.File && !a.isInline
      );

      if (files.length === 0) {
        await notify(item, "error", "No file attachments found in this email.");
        event.completed();
        return;
      }

      await notify(item, "info",
        `Sending ${files.length} attachment${files.length > 1 ? "s" : ""} to Dokr…`
      );

      let ok = 0;
      const errors = [];

      for (const att of files) {
        try {
          const content = await getAttachmentContent(att.id);
          await upload(content, att.name, att.contentType || "application/octet-stream");
          ok++;
        } catch (err) {
          errors.push(`${att.name}: ${err.message}`);
        }
      }

      if (errors.length === 0) {
        await notify(item, "success",
          `✓ ${ok} file${ok > 1 ? "s" : ""} sent to Dokr`
        );
      } else {
        await notify(item, "error",
          `${ok} sent, ${errors.length} failed — ${errors.join(" | ")}`
        );
      }

      event.completed();
    }

    // ── Helpers ───────────────────────────────────────────────────────────────

    /** Wrap getAttachmentContentAsync in a promise. */
    function getAttachmentContent(id) {
      return new Promise((resolve, reject) => {
        Office.context.mailbox.item.getAttachmentContentAsync(id, result => {
          if (result.status === Office.AsyncResultStatus.Succeeded) {
            resolve(result.value);   // { content: base64string, format: ... }
          } else {
            reject(new Error(result.error.message));
          }
        });
      });
    }

    /** Decode base64 attachment and POST as multipart/form-data to the API. */
    async function upload(content, filename, mimeType) {
      // content.content is base64-encoded file bytes
      const binary = atob(content.content);
      const bytes  = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

      const blob = new Blob([bytes], { type: mimeType });
      const form = new FormData();
      form.append("file", new File([blob], filename, { type: mimeType }));

      const headers = {
        // Bypasses the ngrok browser-warning interstitial for API calls.
        // Safe to leave in permanently — ignored by non-ngrok servers.
        "ngrok-skip-browser-warning": "true",
      };
      // if (API_KEY) headers["X-API-Key"] = API_KEY;

      const res = await fetch(SUBMIT_PATH, {
        method: "POST",
        body:   form,
        headers,
      });

      if (!res.ok) {
        const text = await res.text().catch(() => res.statusText);
        throw new Error(`HTTP ${res.status}: ${text.slice(0, 120)}`);
      }
    }

    /**
     * Show a notification bar at the top of the email.
     *
     * type: "info" | "success" | "error"
     *
     * Office only exposes InformationalMessage and ErrorMessage natively.
     * We use InformationalMessage for both info and success (the message
     * text carries the ✓ prefix for success).
     */
    function notify(item, type, message) {
      return new Promise(resolve => {
        const payload =
          type === "error"
            ? {
                type: Office.MailboxEnums.ItemNotificationMessageType.ErrorMessage,
                message,
              }
            : {
                type: Office.MailboxEnums.ItemNotificationMessageType.InformationalMessage,
                message,
                icon: "Icon.16x16",
                persistent: type === "info",   // "uploading" stays; success auto-dismisses
              };

        item.notificationMessages.replaceAsync("dokr-status", payload, () => resolve());
      });
    }
  </script>
</head>
<body></body>
</html>
