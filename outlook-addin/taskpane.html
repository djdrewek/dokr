<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dokr Panel</title>
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <style>
    :root {
      --bg:       #0D0D0D;
      --surface:  #141414;
      --border:   #232323;
      --text:     #E8E8E8;
      --muted:    #888;
      --dim:      #555;
      --accent:   #22C55E;
      --warn:     #F59E0B;
      --danger:   #EF4444;
      --blue:     #3B82F6;
      --radius:   6px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .logo {
      width: 20px; height: 20px;
      background: var(--accent);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; color: #000;
    }
    .header-title { font-weight: 600; font-size: 13px; }
    .header-sub   { font-size: 11px; color: var(--muted); margin-left: auto; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab {
      flex: 1;
      padding: 9px 0;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all .15s;
      user-select: none;
    }
    .tab.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }
    .tab:hover:not(.active) { color: var(--text); }

    /* ── Panels ── */
    .panel { display: none; flex: 1; overflow-y: auto; padding: 12px; }
    .panel.active { display: flex; flex-direction: column; gap: 8px; }

    /* ── History list ── */
    .history-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .history-label { font-size: 11px; color: var(--muted); letter-spacing: .04em; text-transform: uppercase; }
    .btn-icon {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 11px;
      padding: 3px 8px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .btn-icon:hover { color: var(--text); border-color: var(--dim); }

    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .history-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .history-filename {
      flex: 1;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chip {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .chip-sent      { color: var(--accent); background: #0D2B1A; }
    .chip-duplicate { color: var(--warn);   background: #2B1D0A; }
    .chip-failed    { color: var(--danger); background: #2B0A0A; }

    .history-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--dim);
    }
    .history-doc-id {
      font-family: monospace;
      font-size: 10px;
      color: var(--dim);
      cursor: pointer;
      text-decoration: underline dotted;
    }
    .history-link {
      margin-left: auto;
      font-size: 11px;
      color: var(--blue);
      text-decoration: none;
      flex-shrink: 0;
    }
    .history-link:hover { text-decoration: underline; }
    .history-error {
      font-size: 11px;
      color: var(--danger);
      opacity: .85;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--dim);
      text-align: center;
      padding: 40px 20px;
    }
    .empty-state .empty-icon { font-size: 28px; opacity: .5; }

    /* ── Settings form ── */
    .field-group { display: flex; flex-direction: column; gap: 5px; }
    .field-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .field-input, .field-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 12px;
      padding: 7px 10px;
      width: 100%;
      outline: none;
      transition: border-color .15s;
    }
    .field-input:focus, .field-select:focus { border-color: var(--accent); }
    .field-select { cursor: pointer; }
    .field-select option { background: var(--surface); }

    .password-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .password-wrap .field-input { padding-right: 36px; }
    .show-hide {
      position: absolute;
      right: 8px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      padding: 0;
    }
    .show-hide:hover { color: var(--text); }

    .btn-row { display: flex; gap: 8px; }
    .btn {
      flex: 1;
      padding: 8px 0;
      border-radius: var(--radius);
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }

    .status-line {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: var(--radius);
      border: 1px solid transparent;
    }
    .status-ok     { color: var(--accent); background: #0D2B1A; border-color: #1A4D2E; }
    .status-error  { color: var(--danger); background: #2B0A0A; border-color: #5C1A1A; }
    .status-idle   { color: var(--muted);  background: var(--surface); border-color: var(--border); }

    .divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">D</div>
    <div class="header-title">Dokr</div>
    <div class="header-sub" id="user-email">—</div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-recent"   onclick="switchTab('recent')">Recent</div>
    <div class="tab"        id="tab-settings" onclick="switchTab('settings')">Settings</div>
  </div>

  <!-- Recent panel -->
  <div class="panel active" id="panel-recent">
    <div class="history-toolbar">
      <span class="history-label">Submissions</span>
      <button class="btn-icon" onclick="loadHistory()">↻ Refresh</button>
    </div>
    <div id="history-list"></div>
  </div>

  <!-- Settings panel -->
  <div class="panel" id="panel-settings">

    <div class="field-group">
      <label class="field-label">Dokr Server URL</label>
      <input type="url" id="cfg-url" class="field-input"
             placeholder="https://abc123.ngrok-free.app" />
      <div style="font-size:11px;color:var(--dim);">
        The base URL of your running Dokr server (ngrok or production).
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">API Key <span style="color:var(--dim);font-size:10px;">(optional)</span></label>
      <div class="password-wrap">
        <input type="password" id="cfg-key" class="field-input"
               placeholder="dk_live_…" autocomplete="off" />
        <button class="show-hide" onclick="toggleKey()" id="key-toggle">Show</button>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Default Priority</label>
      <select id="cfg-priority" class="field-select">
        <option value="standard">Standard</option>
        <option value="express">Express</option>
      </select>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveSettings()">Save</button>
      <button class="btn btn-secondary" onclick="testConnection()">Test</button>
    </div>

    <div class="status-line status-idle" id="conn-status">
      Not tested — click Test to verify connection.
    </div>

    <hr class="divider" />

    <div class="field-group">
      <label class="field-label">Danger Zone</label>
      <button class="btn btn-secondary" onclick="clearHistory()" style="flex:none;">
        Clear submission history
      </button>
    </div>

  </div>

  <script>
    "use strict";

    // ── Constants ──────────────────────────────────────────────────────────────
    const DEFAULT_BASE_URL  = "https://lily-dragging-buffalo.ngrok-free.dev";
    const HISTORY_KEY       = "dokr_history";
    const BASE_URL_KEY      = "dokr_base_url";
    const API_KEY_KEY       = "dokr_api_key";
    const PRIORITY_KEY      = "dokr_priority";
    const MAX_HISTORY       = 30;

    // ── Office bootstrap ───────────────────────────────────────────────────────
    Office.onReady(() => {
      // Show the signed-in user's email in the header
      const profile = Office.context.mailbox && Office.context.mailbox.userProfile;
      if (profile && profile.emailAddress) {
        document.getElementById("user-email").textContent = profile.emailAddress;
      }
      loadHistory();
      loadSettingsForm();
    });

    // ── Tab switching ──────────────────────────────────────────────────────────
    function switchTab(name) {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
      document.getElementById("tab-" + name).classList.add("active");
      document.getElementById("panel-" + name).classList.add("active");
      if (name === "recent") loadHistory();
      if (name === "settings") loadSettingsForm();
    }

    // ── Helpers ────────────────────────────────────────────────────────────────
    function getBaseUrl() {
      return (localStorage.getItem(BASE_URL_KEY) || DEFAULT_BASE_URL).replace(/\/$/, "");
    }

    function timeAgo(isoStr) {
      if (!isoStr) return "—";
      const d   = new Date(isoStr);
      const now = Date.now();
      const sec = Math.round((now - d.getTime()) / 1000);
      if (sec < 60)   return "just now";
      if (sec < 3600) return `${Math.floor(sec / 60)} min ago`;
      if (sec < 86400)return `${Math.floor(sec / 3600)} hr ago`;
      if (sec < 604800) return `${Math.floor(sec / 86400)} day${Math.floor(sec / 86400) > 1 ? "s" : ""} ago`;
      return d.toLocaleDateString();
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).catch(() => {});
    }

    // ── History ────────────────────────────────────────────────────────────────
    function loadHistory() {
      const list = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
      const container = document.getElementById("history-list");

      if (!list.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <div>No submissions yet</div>
            <div style="font-size:11px;color:var(--dim);">
              Use the Send to Dokr button to submit attachments.
            </div>
          </div>`;
        return;
      }

      container.innerHTML = list.map((item, i) => {
        const chipClass = item.status === "sent"      ? "chip-sent"
                        : item.status === "duplicate" ? "chip-duplicate"
                        :                               "chip-failed";
        const chipLabel = item.status === "sent"      ? "✓ Sent"
                        : item.status === "duplicate" ? "⊘ Duplicate"
                        :                               "✗ Failed";

        const base = getBaseUrl();
        const viewHref = item.doc_id
          ? `${base}/dashboard/docs/${item.doc_id}`
          : null;

        const docIdHtml = item.doc_id
          ? `<span class="history-doc-id" title="Click to copy"
               onclick="copyToClipboard('${item.doc_id}')">${item.doc_id.slice(0, 24)}…</span>`
          : "";

        const viewHtml = viewHref
          ? `<a href="${viewHref}" target="_blank" class="history-link">View →</a>`
          : "";

        const errorHtml = (item.status === "failed" && item.error)
          ? `<div class="history-error">${escHtml(item.error.slice(0, 120))}</div>`
          : "";

        return `
          <div class="history-item">
            <div class="history-row">
              <span class="history-filename" title="${escHtml(item.file)}">${escHtml(item.file)}</span>
              <span class="chip ${chipClass}">${chipLabel}</span>
            </div>
            <div class="history-meta">
              <span>${timeAgo(item.time)}</span>
              ${docIdHtml}
              ${viewHtml}
            </div>
            ${errorHtml}
          </div>`;
      }).join("");
    }

    function clearHistory() {
      if (!confirm("Clear all submission history?")) return;
      localStorage.removeItem(HISTORY_KEY);
      loadHistory();
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    // ── Settings ───────────────────────────────────────────────────────────────
    function loadSettingsForm() {
      document.getElementById("cfg-url").value      = localStorage.getItem(BASE_URL_KEY) || DEFAULT_BASE_URL;
      document.getElementById("cfg-key").value      = localStorage.getItem(API_KEY_KEY)  || "";
      document.getElementById("cfg-priority").value = localStorage.getItem(PRIORITY_KEY) || "standard";
    }

    function saveSettings() {
      const url      = document.getElementById("cfg-url").value.trim().replace(/\/$/, "");
      const key      = document.getElementById("cfg-key").value.trim();
      const priority = document.getElementById("cfg-priority").value;

      if (!url) {
        setConnStatus("error", "Server URL cannot be empty.");
        return;
      }
      try { new URL(url); } catch {
        setConnStatus("error", "That doesn't look like a valid URL.");
        return;
      }

      localStorage.setItem(BASE_URL_KEY, url);
      if (key) {
        localStorage.setItem(API_KEY_KEY, key);
      } else {
        localStorage.removeItem(API_KEY_KEY);
      }
      localStorage.setItem(PRIORITY_KEY, priority);

      setConnStatus("ok", "Settings saved.");
      setTimeout(() => setConnStatus("idle", "Not tested — click Test to verify connection."), 2500);
    }

    async function testConnection() {
      const url = (document.getElementById("cfg-url").value.trim() || DEFAULT_BASE_URL).replace(/\/$/, "");
      setConnStatus("idle", "Testing…");
      try {
        const res = await fetch(url + "/health", {
          headers: { "ngrok-skip-browser-warning": "true" },
          signal: AbortSignal.timeout(8000),
        });
        if (res.ok) {
          const data = await res.json().catch(() => ({}));
          setConnStatus("ok", `✓ Connected — ${data.product || "Dokr"} ${data.version || ""}`);
        } else {
          setConnStatus("error", `HTTP ${res.status} — check the URL and ensure the server is running.`);
        }
      } catch (err) {
        setConnStatus("error", `Connection failed: ${err.message}`);
      }
    }

    function setConnStatus(type, msg) {
      const el = document.getElementById("conn-status");
      el.className = "status-line status-" + type;
      el.textContent = msg;
    }

    function toggleKey() {
      const inp = document.getElementById("cfg-key");
      const btn = document.getElementById("key-toggle");
      if (inp.type === "password") {
        inp.type = "text";
        btn.textContent = "Hide";
      } else {
        inp.type = "password";
        btn.textContent = "Show";
      }
    }
  </script>
</body>
</html>
