[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Don't treat warnings as errors — fpdf2 and pypdf emit DeprecationWarnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
# Short tracebacks for cleaner output
addopts = -v --tb=short
